<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resmi Yazışma Bankası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f8f9fa] text-slate-800 font-sans min-h-screen flex flex-col items-center">
    <div class="w-full bg-[#1a237e] text-white py-2 px-4 text-xs sm:text-sm flex justify-center items-center shadow-md">
        <span>Güvenli Sistem Bağlantısı</span>
    </div>

    <div class="w-full max-w-4xl py-6 px-4 flex-1 flex flex-col">
        <header class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6 text-center">
            <h1 class="text-2xl font-bold text-[#1a237e]">Resmi Yazışma Bankası</h1>
            <p class="text-sm text-slate-500">Otomatik Mevzuat ve Dilekçe Oluşturma Sistemi</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <textarea id="promptInput" rows="4" placeholder="İşlem tanımını buraya yazın..." class="w-full bg-[#f8f9fa] border border-slate-300 rounded-lg p-4 outline-none resize-none"></textarea>
            <div class="mt-4 flex gap-4">
                <button onclick="generateDocument('dilekce')" class="flex-1 bg-[#1a237e] text-white py-3 rounded-lg font-semibold">Belge Oluştur</button>
                <button onclick="generateDocument('mevzuat')" class="flex-1 bg-[#37474f] text-white py-3 rounded-lg font-semibold">Mevzuat Tara</button>
            </div>
            <div id="errorBox" class="mt-4 text-red-600 hidden">Sunucu bağlantı hatası. API anahtarınızı kontrol edin.</div>
        </div>
        <div id="loadingScreen" class="py-16 text-center hidden"><i data-lucide="loader-2" class="w-12 h-12 mx-auto spin text-[#1a237e]"></i></div>
        <div id="resultSection" class="bg-white p-8 rounded-xl shadow-lg mt-6 hidden">
            <div id="textContent" class="whitespace-pre-wrap font-serif"></div>
        </div>
    </div>

    <footer class="w-full bg-white border-t border-slate-200 text-center py-6 text-slate-500 text-sm mt-auto">
        <p>© 2026 Resmi Yazışma Bankası. Tüm hakları saklıdır.</p>
    </footer>

    <script>
        // API ANAHTARINI BURAYA YAPIŞTIRMAYI UNUTMA:
        const apiKey = "AQ.Ab8RN6K2FckC5tQFn8Np_FnXq5_JGZ-O9YiuGsi7BPd7vASidw";

        async function generateDocument(type) {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            document.getElementById('loadingScreen').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Konu: ${prompt}. Resmi ${type === 'dilekce' ? 'dilekçe' : 'mevzuat bilgisi'} oluştur.` }] }]
                    })
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    document.getElementById('textContent').textContent = data.candidates[0].content.parts[0].text;
                    document.getElementById('resultSection').classList.remove('hidden');
                } else {
                    document.getElementById('errorBox').textContent = "Bir hata oluştu.";
                    document.getElementById('errorBox').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('errorBox').textContent = "Sunucu bağlantı hatası.";
                document.getElementById('errorBox').classList.remove('hidden');
            } finally {
                document.getElementById('loadingScreen').classList.add('hidden');
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
